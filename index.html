<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Final Corners — Admin Login</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-card__brand">
        <div class="auth-card__logo">Final<span>Corners</span></div>
        <div class="auth-card__subtitle">Admin Panel</div>
      </div>

      <h1 class="auth-card__title">Sign in to continue</h1>

      <div id="auth-error" class="auth-error hidden" role="alert"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="admin@example.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
        </div>

        <div class="form-group" style="margin-top: 24px;">
          <button class="btn btn--primary" type="submit" id="login-btn" style="width: 100%; justify-content: center;">
            Sign In
          </button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { signIn, redirectIfAuthenticated } from './js/auth.js';

    redirectIfAuthenticated();

    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('auth-error');
    const loginBtn = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
  e.preventDefault();

  errorEl.classList.add('hidden');
  errorEl.textContent = '';

  loginBtn.disabled = true;
  loginBtn.textContent = 'Signing in…';

  const email = document.getElementById('email')?.value?.trim();
  const password = document.getElementById('password')?.value;

  try {
    await signIn(email, password);
    window.location.href = './dashboard.html';
  } catch (err) {
    errorEl.textContent = err.message || 'Invalid credentials. Please try again.';
    errorEl.classList.remove('hidden');
  } finally {
    loginBtn.disabled = false;
    loginBtn.textContent = 'Sign In';
  }
    });
  </script>
</body>
</html>
